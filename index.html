<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>소리자바 약어 키보드 연습기</title>
    <style>
        /* 기본 스타일 */
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 0; 
            touch-action: manipulation; 
            user-select: none; 
            display: flex;
            justify-content: center;
        }
        
        /* 앱 레이아웃 (세로 모드에서도 꽉 차게) */
        #app { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            max-width: 600px; /* 태블릿/PC에서도 보기 좋게 제한 */
            padding: 15px 10px; 
            box-sizing: border-box; 
        }
        
        /* 상단 상태창 */
        .header { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            margin-bottom: 20px; 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            box-sizing: border-box;
        }
        #word-display { font-size: 2em; font-weight: bold; color: #1a73e8; margin-bottom: 15px; }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        button { font-size: 1.1em; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-check { background-color: #ff9800; color: white; }
        .btn-next { background-color: #4caf50; color: white; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #feedback { font-size: 1.2em; font-weight: bold; height: 1.5em; text-align: center; }
        
        /* 키보드 레이아웃 (반응형 퍼센트 단위 적용) */
        .keyboard { 
            width: 100%; 
            background: #e0e5ec; 
            padding: 15px 10px; 
            border-radius: 12px; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1); 
            box-sizing: border-box;
        }
        
        /* 숫자열 */
        .row-num { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .key-num { 
            width: 9%; 
            aspect-ratio: 1.2 / 1; 
            background: linear-gradient(to bottom, #fff, #e6e6e6); 
            border: 1px solid #b3b3b3; 
            border-radius: 4px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: clamp(12px, 3.5vw, 16px); 
            font-weight: bold; color: #555; 
            box-shadow: 0 2px 2px rgba(0,0,0,0.1); 
        }

        /* 중앙 자음열 */
        .row-middle { display: flex; justify-content: space-between; gap: 2%; width: 100%; }
        .hand { display: flex; justify-content: space-between; width: 49%; }
        .col { display: flex; flex-direction: column; justify-content: flex-start; gap: 4px; width: 18.5%; }
        
        /* 양쪽 끝 튀어나온 키 배열 조정 */
        .col.offset-left { margin-top: 10%; }
        .col.offset-right { margin-top: 10%; }

        /* 기본 키 스타일 */
        .key { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            background: linear-gradient(to bottom, #fff, #f0f0f0); 
            border: 1px solid #aaa; 
            border-radius: 4px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: clamp(12px, 3.5vw, 18px); 
            font-weight: bold; color: #333; 
            cursor: pointer; 
            box-shadow: 0 3px 0 #ccc; 
            transition: all 0.1s; 
            box-sizing: border-box;
        }
        .key:active { transform: translateY(3px); box-shadow: 0 0 0 #ccc; }
        
        /* 모음열 (엄지) */
        .row-bottom { display: flex; justify-content: center; margin-top: 15px; position: relative; width: 100%; }
        .thumb-arc { display: flex; justify-content: center; gap: 2%; width: 60%; }
        .key.thumb { width: 15%; aspect-ratio: 1 / 1.5; border-radius: 5px 5px 25px 25px; } 
        .thumb-down { margin-top: 8%; } /* 둥근 아치형 배치를 위해 살짝 내림 */
        .key.space { width: 18%; aspect-ratio: 1.5 / 1; position: absolute; right: 2%; bottom: 0; border-radius: 8px; }

        /* 선택 및 정답 상태 색상 */
        .key.selected { background: #1a73e8; color: white; border-color: #0d47a1; box-shadow: 0 3px 0 #0d47a1; }
        .key.correct-key { background: #28a745 !important; color: white !important; border-color: #1e7e34 !important; box-shadow: 0 3px 0 #1e7e34 !important; }
        .key.wrong-key { background: #dc3545 !important; color: white !important; border-color: #c82333 !important; box-shadow: 0 3px 0 #c82333 !important; }
        .key.missed-key { border: 3px dashed #28a745 !important; color: #28a745 !important; font-weight: 900; background: #e8f5e9 !important; box-shadow: none !important; }

        .text-success { color: #28a745; }
        .text-danger { color: #dc3545; }
    </style>
</head>
<body>

    <div id="app">
        <div class="header">
            <div id="word-display">단어 준비 중...</div>
            <div class="controls">
                <button class="btn-check" id="btn-check" onclick="checkAnswer()">정답확인</button>
                <button class="btn-next" id="btn-next" onclick="nextQuestion()" disabled>다음 문제</button>
            </div>
            <div id="feedback"></div>
        </div>

        <div class="keyboard">
            <div class="row-num">
                <div class="key-num" data-key="N_1">1</div><div class="key-num" data-key="N_2">2</div><div class="key-num" data-key="N_3">3</div><div class="key-num" data-key="N_4">4</div><div class="key-num" data-key="N_5">5</div><div class="key-num" data-key="N_6">6</div><div class="key-num" data-key="N_7">7</div><div class="key-num" data-key="N_8">8</div><div class="key-num" data-key="N_9">9</div><div class="key-num" data-key="N_0">0</div>
            </div>

            <div class="row-middle">
                <div class="hand">
                    <div class="col offset-left">
                        <div class="key" data-key="L_ㅊ">ㅊ</div><div class="key" data-key="L_ㅅ">ㅅ</div><div class="key" data-key="L_ㅁ">ㅁ</div>
                    </div>
                    <div class="col">
                        <div class="key" data-key="L_ㅌ">ㅌ</div><div class="key" data-key="L_ㄷ">ㄷ</div><div class="key" data-key="L_ㄹ">ㄹ</div>
                    </div>
                    <div class="col">
                        <div class="key" data-key="L_ㅋ">ㅋ</div><div class="key" data-key="L_ㅈ">ㅈ</div><div class="key" data-key="L_ㄴ">ㄴ</div>
                    </div>
                    <div class="col">
                        <div class="key" data-key="L_ㅂ">ㅂ</div><div class="key" data-key="L_ㄱ">ㄱ</div><div class="key" data-key="L_ㅎ">ㅎ</div>
                    </div>
                    <div class="col">
                        <div class="key" data-key="L_ㅍ">ㅍ</div><div class="key" data-key="L_ㄲ">ㅋ</div><div class="key" data-key="L_기호">⊣</div>
                    </div>
                </div>

                <div class="hand">
                    <div class="col">
                        <div class="key" data-key="R_ㄲ">ㄲ</div><div class="key" data-key="R_ㄱ">ㄱ</div><div class="key" data-key="R_ㅆ">ㅆ</div>
                    </div>
                    <div class="col">
                        <div class="key" data-key="R_ㅎ">ㅎ</div><div class="key" data-key="R_ㄴ">ㄴ</div><div class="key" data-key="R_ㅇ">ㅇ</div>
                    </div>
                    <div class="col">
                        <div class="key" data-key="R_ㅌ">ㅌ</div><div class="key" data-key="R_ㄹ">ㄹ</div><div class="key" data-key="R_ㅁ">ㅁ</div>
                    </div>
                    <div class="col">
                        <div class="key" data-key="R_ㅊ">ㅊ</div><div class="key" data-key="R_ㅅ">ㅅ</div><div class="key" data-key="R_ㄷ">ㄷ</div>
                    </div>
                    <div class="col offset-right">
                        <div class="key" data-key="R_ㅍ">ㅍ</div><div class="key" data-key="R_ㅂ">ㅂ</div><div class="key" data-key="R_ㅈ">ㅈ</div>
                    </div>
                </div>
            </div>

            <div class="row-bottom">
                <div class="thumb-arc">
                    <div class="key thumb" data-key="V_ㅗ">ㅗ</div>
                    <div class="key thumb" data-key="V_ㅏ">ㅏ</div>
                    <div class="key thumb thumb-down" data-key="V_ㅜ">ㅜ</div>
                    <div class="key thumb thumb-down" data-key="V_ㅡ">ㅡ</div>
                    <div class="key thumb" data-key="V_ㅓ">ㅓ</div>
                    <div class="key thumb" data-key="V_ㅣ">ㅣ</div>
                </div>
                <div class="key space" data-key="V_SPACE"></div>
            </div>
        </div>
    </div>

    <script>
        // 연습할 약어 데이터 세팅 (자주 헷갈리는 단어를 여기에 추가하세요)
        const dictionary = [
            { word: "대한민국", keys: ["L_ㄷ", "L_ㅎ", "V_ㅏ", "R_ㅁ", "R_ㄱ"] },
            { word: "그래서", keys: ["L_ㄱ", "L_ㅅ", "V_ㅓ", "V_ㅣ"] }, 
            { word: "국회의원", keys: ["L_ㄱ", "L_ㅎ", "V_ㅜ", "R_ㅇ"] },
            { word: "감사합니다", keys: ["L_ㄱ", "V_ㅏ", "R_ㅁ", "L_ㅅ", "L_ㅎ", "V_ㅏ", "R_ㅂ", "L_ㄴ", "V_ㅣ", "R_ㄷ"] } 
        ];

        let currentQuestion = null;
        let selectedKeys = new Set();
        let isAnswerChecked = false;

        document.querySelectorAll('.key, .key-num').forEach(keyEl => {
            keyEl.addEventListener('click', () => {
                if (isAnswerChecked) return;
                
                const keyValue = keyEl.getAttribute('data-key');
                if (selectedKeys.has(keyValue)) {
                    selectedKeys.delete(keyValue);
                    keyEl.classList.remove('selected');
                } else {
                    selectedKeys.add(keyValue);
                    keyEl.classList.add('selected');
                }
            });
        });

        function nextQuestion() {
            selectedKeys.clear();
            isAnswerChecked = false;
            
            document.querySelectorAll('.key, .key-num').forEach(keyEl => {
                keyEl.classList.remove('selected', 'correct-key', 'wrong-key', 'missed-key');
            });
            
            document.getElementById('feedback').innerText = '';
            document.getElementById('btn-check').disabled = false;
            document.getElementById('btn-next').disabled = true;

            const randomIndex = Math.floor(Math.random() * dictionary.length);
            currentQuestion = dictionary[randomIndex];
            document.getElementById('word-display').innerText = currentQuestion.word;
        }

        function checkAnswer() {
            if (!currentQuestion) return;
            if (selectedKeys.size === 0) {
                alert("키를 하나 이상 터치해주세요.");
                return;
            }

            isAnswerChecked = true;
            document.getElementById('btn-check').disabled = true;
            document.getElementById('btn-next').disabled = false;

            const correctKeys = new Set(currentQuestion.keys);
            let isPerfect = true;

            document.querySelectorAll('.key, .key-num').forEach(keyEl => {
                const keyValue = keyEl.getAttribute('data-key');
                const isSelected = selectedKeys.has(keyValue);
                const isCorrect = correctKeys.has(keyValue);

                if (isSelected && isCorrect) {
                    keyEl.classList.add('correct-key'); 
                } else if (isSelected && !isCorrect) {
                    keyEl.classList.add('wrong-key'); 
                    isPerfect = false;
                } else if (!isSelected && isCorrect) {
                    keyEl.classList.add('missed-key'); 
                    isPerfect = false;
                }
            });

            const feedbackEl = document.getElementById('feedback');
            if (isPerfect) {
                feedbackEl.innerText = "정답! 🎉";
                feedbackEl.className = "text-success";
            } else {
                feedbackEl.innerText = "오답입니다 💦";
                feedbackEl.className = "text-danger";
            }
        }

        nextQuestion();
    </script>
</body>
</html>
